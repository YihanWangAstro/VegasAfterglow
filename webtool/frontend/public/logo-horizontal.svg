<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="360" viewBox="0 0 1800 360" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a44"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <linearGradient id="jet-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#ff6600" />
    </linearGradient>
    <filter id="text-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== Circle graphic (left, scaled down) ===== -->
  <g transform="translate(180, 180) scale(0.45)">
    <circle cx="0" cy="0" r="350" fill="url(#bg-grad)" />

    <!-- Radiating pulses -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#ff6666" stroke-width="8" opacity="0.6">
      <animate attributeName="r" values="10;300" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#39A275" stroke-width="8" opacity="0.6">
      <animate attributeName="r" values="10;300" dur="6s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="6s" begin="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#0066cc" stroke-width="8" opacity="0.6">
      <animate attributeName="r" values="10;300" dur="6s" begin="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="6s" begin="4s" repeatCount="indefinite" />
    </circle>

    <!-- Rings -->
    <g opacity="0.9" fill="none">
      <path d="M0,-300 A300,300 0 1,1 -0.01,-300 Z"
            stroke="#ff6666" stroke-width="15" stroke-dasharray="40,25" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="320s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-225 A225,225 0 1,1 -0.01,-225 Z"
            stroke="#39A275" stroke-width="15" stroke-dasharray="20,15">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="240s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-150 A150,150 0 1,1 -0.01,-150 Z"
            stroke="#0066cc" stroke-width="15" stroke-dasharray="15,10">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="200s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Jets -->
    <path d="M0,0 L150,-150 C200,-200 220,-220 250,-250"
          stroke="url(#jet-grad)" stroke-width="32" fill="none" stroke-linecap="round"/>
    <path d="M0,0 L-150,150 C-200,200 -220,220 -250,250"
          stroke="url(#jet-grad)" stroke-width="32" fill="none" stroke-linecap="round"/>

    <!-- Central burst -->
    <circle cx="0" cy="0" r="60" fill="#ff9e00" />
    <circle cx="0" cy="0" r="35" fill="#ffcc00" />
  </g>

  <!-- ===== Text (right, single line, large) ===== -->
  <text x="400" y="235"
        font-family="Arial, sans-serif"
        font-weight="bold"
        font-size="155"
        fill="#39A275">VegasAfterglow
  </text>
</svg>
