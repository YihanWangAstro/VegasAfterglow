steps:
- name: gcr.io/cloud-builders/docker
  env: ['DOCKER_BUILDKIT=1']
  args:
  - build
  - --build-arg=BUILDKIT_INLINE_CACHE=1
  - --build-arg=VEGASAFTERGLOW_VERSION=${_VA_VERSION}
  - --cache-from
  - $_IMAGE_LATEST
  - -t
  - $_IMAGE_URI
  - -t
  - $_IMAGE_LATEST
  - -f
  - webtool/backend/Dockerfile
  - .
substitutions:
  _VA_VERSION: '0.0.0'
images:
- $_IMAGE_URI
- $_IMAGE_LATEST
