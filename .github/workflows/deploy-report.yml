name: Deploy Validation Report

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for versioned copy (e.g., 2.0.1). Leave empty to update latest only.'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        required: false
        type: string
  schedule:
    # Weekly full-validation run; refreshes reports/latest only (no versioned copy)
    - cron: '17 6 * * 1'

jobs:
  generate:
    name: Generate report (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is the default report at reports/latest/; others are siblings
          - os: macos-latest
            platform: macos
            links: '--platform-link macos=. --platform-link linux=linux/ --platform-link windows=windows/ --archive-href ../'
          - os: ubuntu-latest
            platform: linux
            links: '--platform-link macos=../ --platform-link linux=. --platform-link windows=../windows/ --archive-href ../../'
          - os: windows-latest
            platform: windows
            links: '--platform-link macos=../ --platform-link linux=../linux/ --platform-link windows=. --archive-href ../../'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (profile build)
        shell: bash
        run: pip install -e ".[test,mcmc]" --config-settings=cmake.define.AFTERGLOW_PROFILE=ON

      - name: Run pytest
        shell: bash
        run: pytest tests/ -q --junitxml=py-junit.xml

      - name: Full validation + report
        shell: bash
        run: |
          echo "::notice::Benchmark timings reflect the CI runner, not release hardware"
          mkdir -p out
          # a validation failure must not block publishing the report that documents it
          if python tests/validation/run_validation.py --all; then
            echo "passed" > out/validation-status.txt
          else
            echo "failed" > out/validation-status.txt
          fi
          python tests/report.py py-junit.xml \
            --label py-junit.xml="Python (pytest)" \
            --validation tests/validation/regression/results/regression_results.json \
            --benchmark tests/validation/benchmark/results/benchmark_history.json \
            ${{ matrix.links }} \
            -o out/index.html

      - name: Upload platform report (and junit for diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.platform }}
          path: |
            out/
            py-junit.xml
          if-no-files-found: warn

  deploy:
    name: Assemble and deploy to GitHub Pages
    needs: generate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download platform reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: artifacts/

      - name: Assemble report tree (macOS at the root)
        run: |
          mkdir -p deploy_report
          [ -f artifacts/report-macos/out/index.html ] && cp artifacts/report-macos/out/index.html deploy_report/index.html
          [ -f artifacts/report-linux/out/index.html ] && mkdir -p deploy_report/linux \
            && cp artifacts/report-linux/out/index.html deploy_report/linux/index.html
          [ -f artifacts/report-windows/out/index.html ] && mkdir -p deploy_report/windows \
            && cp artifacts/report-windows/out/index.html deploy_report/windows/index.html
          # degraded fallback: never leave reports/latest/ without a root page
          if [ ! -f deploy_report/index.html ]; then
            FIRST=$(ls artifacts/report-*/out/index.html 2>/dev/null | head -1)
            [ -n "$FIRST" ] && cp "$FIRST" deploy_report/index.html
          fi
          [ -f deploy_report/index.html ] || { echo "::error::no platform report was produced"; exit 1; }
          cat artifacts/report-*/out/validation-status.txt 2>/dev/null | sort -u > statuses.txt
          # a generate leg that died before validation produced no status: treat as failed
          FAILED_LEGS=0
          for plat in macos linux windows; do
            [ -f "artifacts/report-$plat/out/validation-status.txt" ] || FAILED_LEGS=$((FAILED_LEGS+1))
          done
          [ "$FAILED_LEGS" -gt 0 ] && echo "failed" >> statuses.txt
          echo "validation statuses: $(paste -sd, statuses.txt)"

      - name: Deploy to GitHub Pages (latest)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy_report/
          destination_dir: reports/latest
          keep_files: true

      - name: Deploy to GitHub Pages (versioned)
        if: ${{ inputs.version != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy_report/
          destination_dir: reports/v${{ inputs.version }}
          keep_files: true

      - name: Build reports index
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          {
            git ls-tree --name-only origin/gh-pages reports/ 2>/dev/null || true
            echo "reports/v${{ inputs.version }}"
          } | grep -oE 'v[0-9][^/ ]*' | sort -urV > versions.txt || true
          python tests/report_index.py versions.txt report_index/index.html

      - name: Deploy reports index
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: report_index/
          destination_dir: reports
          keep_files: true

      - name: Fail if any platform's validation failed
        run: |
          if grep -q failed statuses.txt; then
            echo "::error::Validation failed on at least one platform — the published report documents it"
            exit 1
          fi
