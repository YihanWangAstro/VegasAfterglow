name: Build and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, no publish/tag)'
        required: false
        type: boolean
        default: false

jobs:
  build_wheels:
    name: Build ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: [cp39, cp310, cp311, cp312, cp313, cp314]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Setup ccache for faster C++ compilation
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-${{ matrix.python }}-ccache
          restore-keys: |
            ${{ matrix.os }}-ccache

      - name: Build wheels
        run: |
          python -m pip install cibuildwheel
          python -m cibuildwheel --output-dir wheelhouse
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
          CIBW_BUILD: "${{ matrix.python }}-*"
          CIBW_SKIP: "*-win32* *_i686* *musllinux*"
          CIBW_ARCHS_WINDOWS: "AMD64 ARM64"
          CIBW_ARCHS_MACOS: "arm64 x86_64"
          # Install ccache for each platform
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y ccache || (apt-get update && apt-get install -y ccache)
          CIBW_BEFORE_ALL_MACOS: >
            brew install ccache
          # Use ccache and parallel builds for faster compilation
          CIBW_ENVIRONMENT_LINUX: >
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version }}"
            PATH="/usr/lib/ccache:$PATH"
            CCACHE_DIR="/host${{ github.workspace }}/.ccache"
            CMAKE_BUILD_PARALLEL_LEVEL="$(nproc)"
            CMAKE_ARGS="-DAFTERGLOW_MARCH_NATIVE=OFF"
          CIBW_ENVIRONMENT_WINDOWS: >
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version }}"
            CMAKE_ARGS="-DAFTERGLOW_MARCH_NATIVE=OFF"
          CIBW_ENVIRONMENT_MACOS: >
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version }}"
            PATH="/opt/homebrew/opt/ccache/libexec:/usr/local/opt/ccache/libexec:$PATH"
            CCACHE_DIR="${{ github.workspace }}/.ccache"
            CMAKE_BUILD_PARALLEL_LEVEL="$(sysctl -n hw.ncpu)"
            CMAKE_ARGS="-DAFTERGLOW_MARCH_NATIVE=OFF"
          CIBW_TEST_COMMAND: python {project}/tests/wheel_smoke.py
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python }}
          path: wheelhouse/
          if-no-files-found: error

  validate_and_report:
    name: Validate and Deploy Report
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: wheelhouse/
          pattern: 'wheels-*'

      - name: Collect wheels
        run: |
          mkdir -p dist
          find wheelhouse -type f -name '*.whl' -exec mv '{}' dist/ \;

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build scikit-build-core>=0.4.3 pybind11>=2.6.0
          python -m build --sdist --outdir dist/
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}

      - name: Generate unified test & validation report
        run: |
          echo "::notice::Benchmark timings reflect the CI runner, not release hardware"
          pip install -e ".[test,mcmc]" --config-settings=cmake.define.AFTERGLOW_PROFILE=ON
          pytest tests/ -q --junitxml=py-junit.xml
          python tests/validation/run_validation.py --all
          mkdir -p deploy_report
          python tests/report.py py-junit.xml \
            --label py-junit.xml="Python (pytest)" \
            --validation tests/validation/regression/results/regression_results.json \
            --benchmark tests/validation/benchmark/results/benchmark_history.json \
            -o deploy_report/index.html

      - name: Deploy report to GitHub Pages (versioned)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy_report/
          destination_dir: reports/v${{ inputs.version }}
          keep_files: true

      - name: Deploy report to GitHub Pages (latest)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy_report/
          destination_dir: reports/latest
          keep_files: true

      - name: Build reports index
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          {
            git ls-tree --name-only origin/gh-pages reports/ 2>/dev/null || true
            echo "reports/v${{ inputs.version }}"
          } | grep -oE 'v[0-9][^/ ]*' | sort -urV > versions.txt || true
          python tests/report_index.py versions.txt report_index/index.html

      - name: Deploy reports index
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: report_index/
          destination_dir: reports
          keep_files: true

      - name: Upload dist for publish job
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Tag and Publish to PyPI
    needs: validate_and_report
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          package_dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
