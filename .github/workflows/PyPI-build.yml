name: Build and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, no publish/tag)'
        required: false
        type: boolean
        default: false

jobs:
  build_wheels:
    name: Build ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, windows-11-arm, macos-latest]
        python: [cp39, cp310, cp311, cp312, cp313, cp314]
        exclude:
          # numpy (a build requirement) ships win_arm64 wheels only for cp311+,
          # and python.org has no ARM64 Windows installers before 3.11 anyway.
          - os: windows-11-arm
            python: cp39
          - os: windows-11-arm
            python: cp310
      fail-fast: false

    steps:
      # shallow: SETUPTOOLS_SCM_PRETEND_VERSION supplies the version, so scm never
      # consults git history here
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Setup ccache for faster C++ compilation (unused on Windows; the action has no
      # arm64 Windows binary)
      - name: Setup ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-${{ matrix.python }}-ccache
          restore-keys: |
            ${{ matrix.os }}-ccache

      - name: Build wheels
        run: |
          python -m pip install cibuildwheel
          python -m cibuildwheel --output-dir wheelhouse
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
          CIBW_BUILD: "${{ matrix.python }}-*"
          CIBW_SKIP: "*-win32* *_i686* *musllinux*"
          # "native" per runner: AMD64 on windows-latest, ARM64 on windows-11-arm.
          # Never request ARM64 on an x64 runner: the cross-build silently produced
          # x64 .pyds inside arm64-tagged wheels (the shipped 2.0.5 arm64 wheels are
          # broken that way); native runners compile AND smoke-test the real thing.
          CIBW_ARCHS_WINDOWS: "native"
          CIBW_ARCHS_MACOS: "arm64 x86_64"
          # Install ccache for each platform
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y ccache || (apt-get update && apt-get install -y ccache)
          CIBW_BEFORE_ALL_MACOS: >
            brew install ccache
          # Use ccache and parallel builds for faster compilation
          CIBW_ENVIRONMENT_LINUX: >
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version }}"
            PATH="/usr/lib/ccache:$PATH"
            CCACHE_DIR="/host${{ github.workspace }}/.ccache"
            CMAKE_BUILD_PARALLEL_LEVEL="$(nproc)"
            CMAKE_ARGS="-DAFTERGLOW_MARCH_NATIVE=OFF"
          CIBW_ENVIRONMENT_WINDOWS: >
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version }}"
            CMAKE_ARGS="-DAFTERGLOW_MARCH_NATIVE=OFF"
          CIBW_ENVIRONMENT_MACOS: >
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version }}"
            PATH="/opt/homebrew/opt/ccache/libexec:/usr/local/opt/ccache/libexec:$PATH"
            CCACHE_DIR="${{ github.workspace }}/.ccache"
            CMAKE_BUILD_PARALLEL_LEVEL="$(sysctl -n hw.ncpu)"
            CMAKE_ARGS="-DAFTERGLOW_MARCH_NATIVE=OFF"
          CIBW_TEST_COMMAND: python {project}/tests/wheel_smoke.py
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python }}
          path: wheelhouse/
          if-no-files-found: error

  report:
    name: Validation report (all platforms)
    needs: build_wheels
    uses: ./.github/workflows/deploy-report.yml
    with:
      version: ${{ inputs.version }}
    permissions:
      contents: write

  assemble_dist:
    name: Assemble distribution
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      # shallow: SETUPTOOLS_SCM_PRETEND_VERSION supplies the version, so scm never
      # consults git history here
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: wheelhouse/
          pattern: 'wheels-*'

      - name: Collect wheels
        run: |
          mkdir -p dist
          find wheelhouse -type f -name '*.whl' -exec mv '{}' dist/ \;

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build scikit-build-core>=0.4.3 pybind11>=2.6.0
          python -m build --sdist --outdir dist/
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}

      - name: Upload dist for publish job
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Tag and Publish to PyPI
    needs: [assemble_dist, report]
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write

    steps:
      # shallow: SETUPTOOLS_SCM_PRETEND_VERSION supplies the version, so scm never
      # consults git history here
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          package_dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
