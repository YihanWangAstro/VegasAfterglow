name: Update ADS citation count

# Daily job that queries the NASA ADS API for the number of papers citing the
# VegasAfterglow methods paper (Wang, Chen & Zhang 2026) and publishes the
# result to the `badge-data` branch as ads-citations.json. The README badge
# reads that file via the shields.io endpoint protocol. The default `main`
# branch is never touched by this workflow, so local clones don't need to
# pull after each run.

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Query ADS API for citation count
        id: ads
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
          BIBCODE: '2026JHEAp..5000490W'
        run: |
          set -euo pipefail
          encoded_query=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote("citations(bibcode:" + sys.argv[1] + ")"))' "$BIBCODE")
          response=$(curl -fsSL \
            -H "Authorization: Bearer $ADS_API_TOKEN" \
            "https://api.adsabs.harvard.edu/v1/search/query?q=${encoded_query}&rows=1&fl=bibcode")
          count=$(echo "$response" | jq -r '.response.numFound')
          # numFound is documented as a non-negative integer; reject anything else
          # to prevent newline/shell injection into $GITHUB_OUTPUT and the later
          # commit message, even if ADS ever returns an unexpected payload.
          if ! [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "Failed to parse citation count from response (got: '$count'):" >&2
            echo "$response" >&2
            exit 1
          fi
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "ADS citation count: $count"

      - name: Render ads-citations.json
        env:
          COUNT: ${{ steps.ads.outputs.count }}
        run: |
          set -euo pipefail
          mkdir -p badge-output
          jq -n \
            --arg label "ADS citations" \
            --arg message "$COUNT" \
            --arg color "blue" \
            '{schemaVersion: 1, label: $label, message: $message, color: $color, cacheSeconds: 3600}' \
            > badge-output/ads-citations.json

      - name: Publish to badge-data branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badge-data
          publish_dir: ./badge-output
          force_orphan: true
          commit_message: "chore: update ADS citation count to ${{ steps.ads.outputs.count }}"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
