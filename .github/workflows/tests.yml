name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # setuptools-scm needs tags for the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: tests-${{ matrix.os }}
          restore-keys: |
            tests-${{ matrix.os }}

      - name: Build and install package
        if: runner.os != 'Windows'
        run: pip install ".[test,mcmc]" pytest
        env:
          CMAKE_ARGS: "-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"

      - name: Build and install package (Windows)
        if: runner.os == 'Windows'
        run: pip install ".[test,mcmc]" pytest
        env:
          CMAKE_ARGS: ""

      - name: Build and run C++ tests
        if: runner.os != 'Windows'
        run: |
          # pip install builds the wheel in an isolated env, so pybind11 is not
          # in the runner's Python — install it and hand CMake its config dir.
          pip install pybind11
          cmake -B build -DAFTERGLOW_TESTS=ON \
            -DPython_EXECUTABLE="$(which python)" \
            -Dpybind11_DIR="$(python -m pybind11 --cmakedir)" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build -j4 --target afterglow_tests
          ./build/afterglow_tests "--logger=HRF,error:JUNIT,all,cpp-junit.xml"

      - name: Run pytest
        # bare `pytest` (not `python -m pytest`): -m prepends the CWD to
        # sys.path, so the VegasAfterglow/ source tree — which has no compiled
        # extension — would shadow the installed wheel.
        run: pytest tests/ -q --junitxml=py-junit.xml

      - name: Wheel smoke test
        run: python tests/wheel_smoke.py

      - name: Build unified test report
        if: always()
        shell: bash
        run: |
          ARGS=()
          [ -f cpp-junit.xml ] && ARGS+=(cpp-junit.xml)
          [ -f py-junit.xml ] && ARGS+=(py-junit.xml)
          [ ${#ARGS[@]} -gt 0 ] && python tests/report.py "${ARGS[@]}" \
            --label "cpp-junit.xml=C++ (Boost.Test)" --label "py-junit.xml=Python (pytest)" \
            -o test-report-${{ matrix.os }}.html || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}
          path: |
            test-report-${{ matrix.os }}.html
            py-junit.xml
            cpp-junit.xml
          if-no-files-found: warn
