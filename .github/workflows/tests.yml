name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # setuptools-scm needs tags for the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: CPU tag for ccache key
        # -march=native objects are CPU-generation-specific; the runner fleet is
        # heterogeneous, so a shared cache would serve AVX-512 objects to an
        # AVX2 machine (SIGILL). Key by model AND feature flags: VMs with the
        # same model name can expose different ISA extensions (hypervisor
        # masking) — a model-only key produced a SIGILL in CI (2026-07).
        if: runner.os != 'Windows'
        id: cpu
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            MODEL=$(sysctl -n machdep.cpu.brand_string)
          else
            MODEL=$(grep -m1 'model name' /proc/cpuinfo; grep -m1 '^flags' /proc/cpuinfo)
          fi
          echo "tag=$(echo "$MODEL" | shasum | cut -c1-10)" >> "$GITHUB_OUTPUT"
          echo "runner CPU: $MODEL"

      - name: Set up ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: tests-${{ matrix.os }}-${{ steps.cpu.outputs.tag }}
          restore-keys: |
            tests-${{ matrix.os }}-${{ steps.cpu.outputs.tag }}

      - name: Build and install package
        run: pip install ".[test,mcmc]" pytest
        env:
          # ccache launchers everywhere except Windows (no ccache there)
          CMAKE_ARGS: ${{ runner.os != 'Windows' && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || '' }}

      - name: Build and run C++ tests
        if: runner.os != 'Windows'
        run: |
          # pip install builds the wheel in an isolated env, so pybind11 is not
          # in the runner's Python — install it and hand CMake its config dir.
          pip install pybind11
          cmake -B build -DAFTERGLOW_TESTS=ON \
            -DPython_EXECUTABLE="$(which python)" \
            -Dpybind11_DIR="$(python -m pybind11 --cmakedir)" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build -j4 --target afterglow_tests
          ./build/afterglow_tests "--logger=HRF,error:JUNIT,all,cpp-junit.xml"

      - name: Run pytest
        # bare `pytest` (not `python -m pytest`): -m prepends the CWD to
        # sys.path, so the VegasAfterglow/ source tree — which has no compiled
        # extension — would shadow the installed wheel.
        run: pytest tests/ -q --junitxml=py-junit.xml

      - name: Wheel smoke test
        run: python tests/wheel_smoke.py

      - name: Build unified test report
        if: always()
        shell: bash
        run: |
          ARGS=()
          [ -f cpp-junit.xml ] && ARGS+=(cpp-junit.xml)
          [ -f py-junit.xml ] && ARGS+=(py-junit.xml)
          [ ${#ARGS[@]} -gt 0 ] && python tests/report.py "${ARGS[@]}" \
            --label "cpp-junit.xml=C++ (Boost.Test)" --label "py-junit.xml=Python (pytest)" \
            -o test-report-${{ matrix.os }}.html || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}
          path: |
            test-report-${{ matrix.os }}.html
            py-junit.xml
            cpp-junit.xml
          if-no-files-found: warn
